<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            width: 320px;
            padding: 14px;
            font-family: Arial, sans-serif;
            color: #111827;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 16px;
        }

        .box {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            white-space: pre-line;
            word-break: break-word;
            margin-bottom: 10px;
            line-height: 1.45;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #2563eb;
            color: white;
        }

        .hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 10px;
            line-height: 1.45;
        }
    </style>
</head>

<body>
    <h3>Teeinblue Token</h3>

    <div class="box" id="info">Loading...</div>

    <button id="copyBtn">Copy Token</button>

    <div class="hint">
        Mở Teeinblue → refresh/search/mở artwork để extension bắt token mới.
    </div>

    <script src="popup.js"></script>
</body>

</html>
